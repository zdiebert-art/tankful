<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tankful — Lake Country, BC</title>
  <meta name="description" content="Should you fill up today? Tankful is a friendly gas-price predictor for Lake Country and the Okanagan." />
  <meta name="theme-color" content="#FFB05A" id="theme-color-meta" />

  <!-- PWA / install -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tankful" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.1/dist/apexcharts.min.js"></script>
</head>
<body data-state="neutral">

  <!-- Animated background blobs -->
  <div class="bg-stage" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="bg-noise"></div>
  </div>

  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="100 -10 400 400" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M471.12,209.85s-15.02,131.54-147.22,151.52c-102.71,15.52-184.81-54.5-198.46-144.83-13.65-90.33,44.67-184.01,146.45-199.39,131.37-19.85,185.29,103.72,185.29,103.72" stroke-width="30"/>
            <path d="M196.19,273.26s30.74,51.08,102.92,51.08,103.41-51.08,103.41-51.08" stroke-width="19"/>
            <line x1="465.47" y1="163.95" x2="362.71" y2="179.47" stroke-width="33"/>
            <circle cx="269.95" cy="191.65" r="46.81" stroke-width="27" fill="none"/>
          </svg>
        </span>
        <span class="brand-text">TankFul</span>
      </div>
      <div class="location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span>Lake Country, BC</span>
      </div>
    </header>

    <!-- HERO: Fill-Up Score -->
    <section class="hero" data-card-id="hero" data-card-label="Score">
      <div class="score-ring-wrap">
        <svg class="score-ring" viewBox="0 0 200 200" aria-hidden="true">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.55)"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="100" cy="100" r="86" />
          <circle class="ring-fill" cx="100" cy="100" r="86" stroke="url(#ringGradient)" />
        </svg>
        <div class="score-content">
          <div class="score-number" id="scoreNumber" aria-live="polite">--</div>
          <div class="score-of">out of 100</div>
        </div>
      </div>

      <div class="verdict-block">
        <div class="verdict" id="verdict">Loading…</div>
        <div class="verdict-sub" id="verdictSub">Crunching numbers</div>
        <details class="score-breakdown">
          <summary id="breakdownSummary">What's driving this score?</summary>
          <ul class="breakdown-list" id="breakdownList">
            <!-- populated by app.js -->
          </ul>
        </details>
      </div>
    </section>

    <!-- WHERE TO FILL UP — stations + spread savings -->
    <section class="where-card glass-card" data-card-id="where" data-card-label="Where to fill up">
      <div class="where-header">
        <div class="where-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span>Where to fill up</span>
        </div>
        <div class="region-picker" id="regionPicker">
          <!-- populated by app.js -->
        </div>
        <button type="button" class="location-btn" id="locationBtn" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <span class="location-btn-label">Show distance</span>
        </button>
        <button type="button" class="location-btn push-btn" id="pushBtn" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 8 3 8H3s3-1 3-8"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
          <span class="push-btn-label">Get alerts</span>
        </button>
      </div>

      <!-- Hero deal card -->
      <div class="deal-hero" id="dealHero">
        <!-- populated by app.js -->
      </div>

      <!-- Station list -->
      <ul class="station-list" id="stationList">
        <!-- populated by app.js -->
      </ul>
    </section>

    <!-- Chart -->
    <section class="chart-card glass-card" data-card-id="chart" data-card-label="Price history">
      <div class="chart-header">
        <h2 class="chart-title">Price history</h2>
        <div class="tabs" role="tablist">
          <button class="tab active" data-range="7" role="tab" aria-selected="true">7 days</button>
          <button class="tab" data-range="30" role="tab" aria-selected="false">30 days</button>
          <button class="tab" data-range="365" role="tab" aria-selected="false">1 year</button>
        </div>
      </div>
      <div id="chart" class="chart-canvas"></div>
      <div class="chart-legend" id="chartLegend"></div>
    </section>

    <!-- Why panel -->
    <section class="why-card glass-card" data-card-id="why" data-card-label="Why this score">
      <div class="why-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 16v-4"/>
          <circle cx="12" cy="8" r="0.5" fill="currentColor"/>
        </svg>
        <span>Why this score?</span>
      </div>
      <div class="indicators" id="indicators">
        <!-- populated by app.js -->
      </div>
    </section>

    <!-- Holidays & long weekends -->
    <section class="modifiers-card glass-card" data-card-id="modifiers" data-card-label="Holidays">
      <div class="why-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="5" width="18" height="16" rx="2"/>
          <path d="M16 3v4"/><path d="M8 3v4"/><path d="M3 11h18"/>
        </svg>
        <span>Holidays &amp; Long Weekends</span>
        <button type="button" class="alert-toggle" id="refineryAlertBtn" title="Heard about a refinery outage? Toggle on to factor it into the score.">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 21V9l4 3V9l4 3V9l4 3V6l4 3v12"/><path d="M3 21h18"/>
          </svg>
          <span class="alert-toggle-label">Supply alert</span>
        </button>
      </div>
      <div class="modifiers-row" id="modifiersRow">
        <!-- populated by app.js -->
      </div>
    </section>

    <!-- Quick tips -->
    <section class="tips-card glass-card" data-card-id="tips" data-card-label="Tips">
      <h2 class="tips-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2v2"/><path d="M12 20v2"/>
          <path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
          <path d="M2 12h2"/><path d="M20 12h2"/>
          <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
          <circle cx="12" cy="12" r="4"/>
        </svg>
        Quick tips for today
      </h2>
      <ul class="tips-list" id="tipsList">
        <!-- populated by app.js -->
      </ul>
    </section>

    <!-- Score legend
         Desktop: position:fixed, floats on the left margin.
         Mobile (≤1024px): compact horizontal bar above the footer. -->
    <aside class="score-legend" id="scoreLegend" aria-label="Score legend">
      <div class="legend-title">Score</div>
      <div class="legend-item" data-state="wait">
        <span class="legend-dot"></span>
        <div class="legend-text">
          <span class="legend-label">Wait</span>
          <span class="legend-range">0–29</span>
        </div>
      </div>
      <div class="legend-item" data-state="neutral">
        <span class="legend-dot"></span>
        <div class="legend-text">
          <span class="legend-label">Maybe</span>
          <span class="legend-range">30–69</span>
        </div>
      </div>
      <div class="legend-item" data-state="fill-up">
        <span class="legend-dot"></span>
        <div class="legend-text">
          <span class="legend-label">Fill Up</span>
          <span class="legend-range">70–100</span>
        </div>
      </div>
    </aside>

    <!-- Footer / cheat sheet link -->
    <footer class="app-footer">
      <a class="cheatsheet-btn" href="cheatsheet.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2h9l5 5v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z"/>
          <path d="M14 2v6h6"/>
          <path d="M9 13h6"/><path d="M9 17h6"/>
        </svg>
        <span>Open printable cheat sheet</span>
      </a>
      <p class="footer-meta">
        <span>Updated <span id="lastUpdated">just now</span></span>
        <span class="dot">•</span>
        <span id="liveStatus">Fetching live data…</span>
      </p>
    </footer>

  </div>

  <script src="js/config.js"></script>
  <script src="js/holidays.js"></script>
  <script src="js/location.js"></script>
  <script src="js/refinery-alert.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/live-data.js"></script>
  <script src="js/score.js"></script>
  <script src="js/chart-config.js"></script>
  <script src="js/push.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pwa.js"></script>
  <!-- card reorder feature parked for now; keeping data-card-id attrs + js/card-reorder.js
       in the repo so we can revive it later with a different UI. -->
  <!-- <script src="js/card-reorder.js"></script> -->
</body>
</html>
