name: Refresh region prices

on:
  schedule:
    # Hourly between 6am and 8pm Pacific Time. BC no longer observes DST, so
    # Pacific Time is a stable UTC-7 year-round: 6am PT = 13:00 UTC, 8pm PT
    # = 03:00 UTC next day. That's 15 pulls per day.
    - cron: "0 13-23,0-3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Jitter the start time by 0-15 minutes so we don't always hit GasBuddy
      # at the exact same minute past the hour. GitHub Actions cron drifts
      # 5-15 min on its own — this just adds a bit more spread.
      - name: Random delay (0-15 min)
        run: |
          DELAY=$((RANDOM % 900))
          echo "Sleeping ${DELAY}s before starting (jitter)."
          sleep $DELAY

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scrape/package-lock.json

      - name: Install scraper deps
        working-directory: scrape
        run: npm ci --no-audit --no-fund

      - name: Install Chromium for Playwright
        working-directory: scrape
        run: npx playwright install --with-deps chromium

      - name: Fetch prices
        run: node scrape/fetch-prices.js

      - name: Commit updated JSON
        run: |
          git config user.name  "tankful-bot"
          git config user.email "tankful-bot@users.noreply.github.com"

          # Stage every prices file, every history file, and the manifest.
          # The scraper always rewrites the manifest, but prices/history
          # only change when something was actually scraped. (The history
          # files were silently dropped by an earlier version of this step
          # — fixed Jun 2 2026 — so the chart was stuck on mock data.)
          git add data/*-prices.json data/*-history.json data/regions.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No price changes — skipping commit."
            exit 0
          fi

          git commit -m "chore(data): refresh region prices ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
